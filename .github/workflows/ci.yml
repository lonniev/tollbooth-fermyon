name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-crypto:
    name: Rust crypto component
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crypto
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup target add wasm32-wasip2
          rustup default stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crypto

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test (crypto vectors vs the tollbooth-dpyc wheel)
        run: cargo test

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-component

      - name: Build component
        run: cargo component build --release

  python-component:
    name: Python component
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint
        run: pipx run ruff check component

      - name: Byte-compile
        run: python -m compileall -q component

      - name: Install test deps
        run: pip install "tollbooth-dpyc==0.59.1" "httpx==0.28.1" pytest

      - name: Test schema generator
        run: pytest component/operator/tests -v

  bridge-worker:
    name: Bridge Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm install

      - name: Validate (dry-run build, no deploy)
        run: npx wrangler deploy --dry-run --outdir /tmp/bridge-build

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
