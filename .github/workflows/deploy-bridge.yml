name: Deploy Bridge Worker

# The HTTPS->Nostr bridge (bridge/) lets the Wasm operator read its Authority
# bootstrap config off WebSocket-only relays at cold start. It deploys on its
# own to Cloudflare Workers, independent of the operator component.
on:
  push:
    branches: [main]
    paths:
      - "bridge/**"
      - ".github/workflows/deploy-bridge.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        working-directory: bridge
        run: npm install

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: bridge
