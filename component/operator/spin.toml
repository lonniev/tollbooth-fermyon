spin_manifest_version = 2

[application]
name = "tollbooth-fermyon"
version = "0.1.0"
authors = ["lonniev"]
description = "DPYC weather Operator MCP as a Spin/WASI component (peer of tollbooth-sample)."

[[trigger.http]]
route = "/..."
component = "operator"

[component.operator]
source = "server.wasm"
# The wasmcp streamable-HTTP transport uses a session store when
# WASMCP_SESSION_ENABLED=true (Mcp-Session-Id); Spin's default KV backs it.
key_value_stores = ["default"]
# The operator is nsec-only and its outbound endpoints arrive at RUNTIME from the
# vault (Neon URL from the bootstrap event; BTCPay host, upstream API hosts from the
# operator credential vault) — none are known at build time. Spin's allowlist is
# fixed at build time, so pre-enumerating hosts can't cover vault-delivered ones.
# Allow all HTTPS (parity with the FastMCP/Horizon operators, which have no outbound
# restriction) plus the local-dev bridge port. Production rides the deployed bridge
# over HTTPS, so the localhost line is dev-only.
allowed_outbound_hosts = [
  "https://*:*",
  "http://localhost:8799",
]

# Config (operator nsec, bridge URL) is delivered at run time via `spin up --env`
# / `spin deploy` variables — never committed. See README "Run".
